name: Deploy Billing Service to Docker Hub (Stage)

on:
  push:
    branches:
      - main
      - stage

env:
  # Substitua pelo seu usuário do Docker Hub
  DOCKER_USER: willcsilva
  IMAGE_NAME: oficina-billing-service

permissions:
  contents: read
  packages: write
  
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -B -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_USER }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKER_USER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Manual Deploy Instructions
        run: |
          echo "🚀 Imagem publicada no Docker Hub: ${{ env.DOCKER_USER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"