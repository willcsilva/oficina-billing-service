name: Deploy Billing Service to Docker Hub (Stage)

on:
  push:
    branches:
      - stage

env:
  DOCKER_USER: willcsilva
  IMAGE_NAME: oficina-billing-service
  NAMESPACE: oficina-sistema-stage

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ github.sha }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -B -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_USER }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKER_USER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy-stage:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🚀 Forma mais segura de configurar o Kubernetes
      - name: Set Kubernetes Context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG_ON_PREMISE }}

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Deploy Billing with Helm (Stage)
        run: |
          VERSION="${{ needs.build-and-push.outputs.version }}"
          
          cat <<EOF > stage-billing-overrides.yaml
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "dev"
            - name: SPRING_CLOUD_AWS_ENDPOINT
              value: "http://localstack-service:4566"
            - name: STRIPE_API_KEY
              value: "${{ secrets.STRIPE_API_KEY }}"
          EOF

          helm upgrade --install billing-service ./chart-billing \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            -f stage-billing-overrides.yaml \
            --set image.repository=${{ env.DOCKER_USER }}/${{ env.IMAGE_NAME }} \
            --set image.tag=$VERSION \
            --history-max 3

          kubectl rollout status deployment/billing-service -n ${{ env.NAMESPACE }} --timeout=300s